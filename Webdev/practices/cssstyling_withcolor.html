<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Css styling with color</title>
        <meta charset="UTF-8"/>
        <!--Embeded style sheets go inside the head tag-->
        <style>
            #one{
                height: 250px; 
                width: 250px;
                border: 4px inset blue;
                background-color: orange;
                color: blue;
                font-size: 40px;
            
            }
            #two{
                height: 250px; 
                width: 250px;
                border: 4px inset green;
                background-color: yellow;
                color: yellowgreen;
                font-size: 40px;
            
            }
            #three{
                height: 250px; 
                width: 250px;
                border: 4px inset red;
                background-color: blue;
                color: yellow;
                font-size: 40px;
            
            }
                  
        </style>
    </head>
<body>
    <h1>CSS styling with color</h1>
    <div id="one">
    <p>complentary</p>
    </div>
    <div id="two">
    <p>analagous</p>
    </div>
    <div id="three">
    <p>triadic</p>
    </div>

</body>

</html>
